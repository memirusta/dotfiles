# Standalone Taşınabilir Hyprland Konfigürasyonu - Mehmet Emir Usta v2.1
# Donanım: Legion 5 (RTX 4060) + AOC 25G4SXU (300Hz)
# =============================================================================

# -----------------------------------------------------
# Monitör Ayarları (Legion 5 & AOC 25G4SXU)
# -----------------------------------------------------
# Legion 5 Ana Ekran (WUXGA 165Hz - Laptop Paneli Solda)
monitor = eDP-1, 1920x1200@165, 0x0, 1

# AOC 25G4SXU Harici Ekran (FHD 300Hz - Sağda)
monitor = desc:AOC 25G4SXU, 1920x1080@300, 1920x0, 1

# Çalışma Alanlarını (Workspace) Dağıtma
# Oyun/Kod ekranı (Workspace 1) doğrudan yüksek hızlı AOC'de açılsın
workspace = 1, monitor:desc:AOC 25G4SXU, default:true
# Yardımcı uygulamalar (Workspace 2) laptop ekranında kalsın
workspace = 2, monitor:eDP-1, default:true

# -----------------------------------------------------
# Çevre Değişkenleri (Environment Variables) - RTX 4060 Optimizasyonu
# -----------------------------------------------------
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# NVIDIA Safkan Güç Ayarları
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,wayland-generic
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# -----------------------------------------------------
# Otomatik Başlatma (Autostart Node)
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = swww-daemon
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# -----------------------------------------------------
# Girdi Ayarları (Input & Keyboard Layout)
# -----------------------------------------------------
input {
    kb_layout = tr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
    sensitivity = 0 # -1.0 - 1.0, 0 değişim yok demek.
}

# -----------------------------------------------------
# Genel Pencere Davranışları (General UI)
# -----------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# -----------------------------------------------------
# Görsel Özelleştirmeler (Decorations & Blur)
# -----------------------------------------------------
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
}

# -----------------------------------------------------
# Animasyonlar (Lightweight Responsive Physics)
# -----------------------------------------------------
animations {
    enabled = true
    bezier = customBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, customBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default, slide
}

# -----------------------------------------------------
# Düzen Ayarları (Layouts)
# -----------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1 # Variable Refresh Rate açık
}

# -----------------------------------------------------
# Pencere Kuralları (Window Rules)
# -----------------------------------------------------
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save As)$

# -----------------------------------------------------
# Kısayollar (Keybindings Node)
# -----------------------------------------------------
$mainMod = SUPER

# Temel Uygulama Tetikleyicileri
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloat,
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Pencere Odak Değiştirme (Vim Style & Arrow Keys)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Masaüstü (Workspace) Değiştirme
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Pencereyi Başka Masaüstüne Taşıma
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Fare ile Pencere Taşıma ve Boyutlandırma
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Ekran Görüntüsü (Grim + Slurp)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Sistem Kontrol (Ses ve Parlaklık)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-