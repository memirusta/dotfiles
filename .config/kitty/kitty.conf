# =============================================================================
# EPIS Ultimate Vault - Saf Kitty Terminal Konfigürasyonu
# =============================================================================

# Font Ayarları (Eğer sistemde yoksa 'ttf-firacode-nerd' paketini kurarsın)
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Pencere ve Arayüz
window_padding_width 12
background_opacity 0.85
hide_window_decorations yes
confirm_os_window_close 0
enable_audio_bell no

# Performans (300Hz Ekran İçin Optimizasyon)
sync_to_monitor yes
repaint_delay 3
input_delay 3

# Renk Paleti (EPIS Waybar Modülü ile Uyumlu Koyu Tema)
background #11111b
foreground #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4
cursor #f5e0dc
cursor_text_color #1e1e2e